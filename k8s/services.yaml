# Deployment + Service + HPA for each of the 5 notification-system microservices.
# Image tags are placeholders — point them at your built/pushed images
# (e.g. ghcr.io/youneedgreg/notification-system-api-gateway:latest).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: notification-system
  labels: { app: api-gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/youneedgreg/notification-system-api-gateway:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: notification-system-config }
            - secretRef: { name: notification-system-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: notification-system
spec:
  selector: { app: api-gateway }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: notification-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
